<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All In One Video Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,Roboto;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
width:95%;
max-width:420px;
padding:25px;
border-radius:20px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.2);
box-shadow:0 8px 32px rgba(0,0,0,0.2);
text-align:center;
}

h1{
color:white;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:15px;
outline:none;
}

button{
width:100%;
padding:14px;
border:2px solid white;
background:transparent;
color:white;
font-size:16px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
color:#333;
}

button:active{
transform:scale(0.95);
}

#result{
margin-top:20px;
color:white;
}

.downloadBtn{
margin-top:10px;
display:block;
padding:10px;
border:2px solid white;
border-radius:10px;
text-decoration:none;
color:white;
transition:0.3s;
}

.downloadBtn:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<div class="container">

<h1>Video Downloader</h1>

<input type="text" id="videoUrl" placeholder="Paste video link here">

<button onclick="downloadVideo()">Download</button>

<div id="result"></div>

</div>

<script>

async function downloadVideo(){

const url=document.getElementById("videoUrl").value;

if(url===""){
alert("Paste video link");
return;
}

document.getElementById("result").innerHTML="Fetching video...";

try{

const response=await fetch("download.php",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"url="+encodeURIComponent(url)
});

const data=await response.json();

if(data.success){

document.getElementById("result").innerHTML=`
<img src="${data.thumbnail}" width="100%" style="border-radius:10px">
<p>${data.title}</p>
<a class="downloadBtn" href="${data.download}" target="_blank">Download Video</a>
`;

}else{

document.getElementById("result").innerHTML="Video not found";

}

}catch(e){

document.getElementById("result").innerHTML="Error fetching video";

}

}

</script>

</body>
</html>
